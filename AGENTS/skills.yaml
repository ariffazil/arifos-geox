    verification_hierarchy:
      L0:
        proves: "Command ran"
        example: "grep returned 0"
      L1:
        proves: "Output matches expectation"
        example: "docker ps shows running container"
      L2:
        proves: "System state changed as intended"
        example: "HTTP endpoint responds correctly"
      L3:
        proves: "Feature actually works"
        example: "User can log in, API returns correct data"
      L4:
        proves: "Change achieved goal in real world"
        example: "System does what Arif asked"

    constitutional:
      floors_checked: ["F1", "F2", "F4", "F7"]
      F1_Amanah: "Reversibility path checked before verification; rollback ready"
      F2_Truth: "L4 reality proof required for sovereign claims; no assumption"
      F4_Clarity: "Verification output is precise, no ambiguity in results"
      F7_Humility: "Uncertainty declared when verification is L2 only (not L4)"


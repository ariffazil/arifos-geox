# GEOX Earth Intelligence Core — SSE Transport Deployment
# DITEMPA BUKAN DIBERI
# Version: v2026.04.11-SSE

services:
  # MCP Server (Earth Intelligence Core + SSE Bridge)
  geox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geox_eic
    ports:
      - "8000:8000"
    environment:
      - GEOX_MODE=research
      - GEOX_VERSION=v2026.04.11-SSE
      - F13_HUMAN_VETO=required
      - PYTHONUNBUFFERED=1
      - GEOX_HOST=0.0.0.0
      - GEOX_PORT=8000
    volumes:
      - ./data:/data:ro
      - vault_999:/app/999_vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - traefik_network
      - arifos_trinity
      - arifos_core_network
    labels:
      # Enable Traefik
      - "traefik.enable=true"
      # MCP endpoint - HTTP (high priority)
      - "traefik.http.routers.geox-mcp.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.geox-mcp.entrypoints=web"
      - "traefik.http.routers.geox-mcp.service=geox-mcp"
      - "traefik.http.routers.geox-mcp.priority=100"
      # Health endpoint - HTTP (high priority)
      - "traefik.http.routers.geox-health.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/health`)"
      - "traefik.http.routers.geox-health.entrypoints=web"
      - "traefik.http.routers.geox-health.service=geox-mcp"
      - "traefik.http.routers.geox-health.priority=100"
      # Tools endpoint - HTTP (high priority)
      - "traefik.http.routers.geox-tools.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/tools`)"
      - "traefik.http.routers.geox-tools.entrypoints=web"
      - "traefik.http.routers.geox-tools.service=geox-mcp"
      - "traefik.http.routers.geox-tools.priority=100"
      # Tools endpoint - HTTPS
      - "traefik.http.routers.geox-tools-secure.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/tools`)"
      - "traefik.http.routers.geox-tools-secure.entrypoints=websecure"
      - "traefik.http.routers.geox-tools-secure.tls=true"
      - "traefik.http.routers.geox-tools-secure.service=geox-mcp"
      - "traefik.http.routers.geox-tools-secure.priority=10"
      # Service definition
      - "traefik.http.services.geox-mcp.loadbalancer.server.port=8000"
      # Long timeout for SSE connections
      - "traefik.http.services.geox-mcp.loadbalancer.responseForwarding.flushInterval=100ms"

  # GUI (React App with 5-Dimensional Interface)
  gui:
    build:
      context: ./geox-gui
      dockerfile: Dockerfile
    container_name: geox_gui
    expose:
      - "80"
    environment:
      - VITE_GEOX_API_URL=https://geox.arif-fazil.com
    restart: unless-stopped
    depends_on:
      - geox
    networks:
      - traefik_network
      - arifos_trinity
      - arifos_core_network
    labels:
      - "traefik.enable=true"
      # GUI HTTP router
      - "traefik.http.routers.geox-gui.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox-gui.entrypoints=web"
      - "traefik.http.routers.geox-gui.service=geox-gui"
      # GUI HTTPS router (uses existing certificate)
      - "traefik.http.routers.geox-gui-secure.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox-gui-secure.entrypoints=websecure"
      - "traefik.http.routers.geox-gui-secure.tls=true"
      - "traefik.http.routers.geox-gui-secure.service=geox-gui"
      - "traefik.http.services.geox-gui.loadbalancer.server.port=80"
      # GUI catches all except API paths (lowest priority)
      - "traefik.http.routers.geox-gui.priority=1"
      - "traefik.http.routers.geox-gui.rule=Host(`geox.arif-fazil.com`) && !PathPrefix(`/mcp`) && !PathPrefix(`/health`) && !PathPrefix(`/tools`) && !PathPrefix(`/invoke`)"

volumes:
  vault_999:
    driver: local

networks:
  traefik_network:
    external: true
  arifos_trinity:
    external: true
  arifos_core_network:
    external: true

# GEOX Earth Intelligence Core — Research Deployment
# DITEMPA BUKAN DIBERI
# Version: v2026.04.10-EIC

version: '3.8'

services:
  # MCP Server (Earth Intelligence Core)
  geox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geox_eic
    ports:
      - "8000:8000"
    environment:
      - GEOX_MODE=research
      - GEOX_VERSION=v2026.04.10-EIC
      - F13_HUMAN_VETO=required
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data:ro
      - vault_999:/app/999_vault
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # GUI (React App with 4 MCP Apps)
  gui:
    image: geox/gui:v2026.04.10
    container_name: geox_gui
    ports:
      - "3000:80"
    environment:
      - VITE_GEOX_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - geox

volumes:
  vault_999:
    driver: local

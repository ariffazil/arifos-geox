# GEOX MCP Server — Production Deployment
# DITEMPA BUKAN DIBERI

version: "3.8"

services:
  geox_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geox_server
    restart: unless-stopped
    
    ports:
      - "8000:8000"
    
    environment:
      - GEOX_VERSION=0.5.0
      - GEOX_SEAL=DITEMPA BUKAN DIBERI
      - GEOX_MODE=governance-engine
      - GEOX_LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    
    networks:
      - geox_network
    
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "3", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    
    labels:
      # Traefik labels for reverse proxy
      - "traefik.enable=true"
      - "traefik.http.routers.geox.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox.entrypoints=websecure"
      - "traefik.http.routers.geox.tls.certresolver=letsencrypt"
      - "traefik.http.services.geox.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.geox-headers.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.geox.middlewares=geox-headers@docker"

networks:
  geox_network:
    driver: bridge

volumes:
  geox_data:
    driver: local

name: SEAL — Push AAA Memory Hardening to HuggingFace

on:
  workflow_dispatch:
    inputs:
      hf_token:
        description: 'HuggingFace write token (hf_XXX) — OR leave blank to use HF_TOKEN secret'
        required: false
        default: ''
      confirm:
        description: 'Type DITEMPA to confirm push'
        required: true
        default: ''

jobs:
  push-to-huggingface:
    name: SEAL — Push 11 files to ariffazil/AAA Dataset
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DITEMPA'
    
    steps:
      - name: Checkout arifOS
        uses: actions/checkout@v4
        with:
          ref: main
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install huggingface_hub
        run: pip install huggingface_hub -q
        
      - name: Push AAA Memory Hardening Files to HuggingFace
        env:
          HF_TOKEN: ${{ github.event.inputs.hf_token || secrets.HF_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi, CommitOperationAdd
          
          token = os.environ.get('HF_TOKEN', '').strip()
          if not token:
              raise ValueError("No HF_TOKEN provided! Add it as a secret or workflow input.")
          
          api = HfApi(token=token)
          user = api.whoami()
          print(f"✅ Authenticated as: {user['name']}")
          
          REPO_ID = "ariffazil/AAA"
          COMMIT_MESSAGE = "SEAL(A-RIF): Quantum Memory Hardening | Constitutional RAG Spec | Sentinel Queries | Memory Governance | H1-H9 Contracts | DITEMPA BUKAN DIBERI"
          STAGING_DIR = Path("AAA-hf-staging")
          
          operations = []
          for path in sorted(STAGING_DIR.rglob("*")):
              if path.is_file():
                  hf_path = str(path.relative_to(STAGING_DIR))
                  content = path.read_bytes()
                  operations.append(CommitOperationAdd(
                      path_in_repo=hf_path,
                      path_or_fileobj=content
                  ))
                  print(f"  + {hf_path} ({len(content):,} bytes)")
          
          print(f"\nPushing {len(operations)} files to {REPO_ID}...")
          
          result = api.create_commit(
              repo_id=REPO_ID,
              repo_type="dataset",
              operations=operations,
              commit_message=COMMIT_MESSAGE,
          )
          
          print(f"\n✅ SUCCESS!")
          print(f"Commit: {result.commit_url}")
          print(f"\nΔ · Ω · Ψ — DITEMPA BUKAN DIBERI — Forged, Not Given.")
          PYEOF

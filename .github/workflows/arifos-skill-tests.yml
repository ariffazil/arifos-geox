name: arifOS Skill Tests

# DISABLED: This workflow references legacy code (skills module, core.execution_validator,
# core.intelligence, core.runtime_bridge) that no longer exists in the current codebase.
# Re-enable once the skill tests are rewritten for the current arifosmcp architecture.
# See: https://github.com/ariffazil/arifOS/pull/287
on:
  workflow_dispatch:  # Manual only until tests are rewritten

jobs:
  constitutional-tests:
    name: Constitutional Compliance
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: F1 Reversibility Test
      run: |
        echo "Testing F1: All skills must create checkpoints"
        python -c "
        from skills import list_skills
        for name in list_skills():
            skill = __import__(f'skills.{name.replace(\"-\", \"_\")}', fromlist=['handler'])
            assert hasattr(skill, 'checkpoint'), f'{name} missing checkpoint'
        print('F1: PASS')
        "
        
    - name: F2 Truth Verification Test
      run: |
        echo "Testing F2: All outputs must be verifiable"
        python -c "
        from core.execution_validator import validate
        result = validate(
            expected={'success': True, 'verification_hash': 'abc'},
            actual={'success': True, 'verification_hash': 'def'},
            session_id='test'
        )
        assert result.earth_witness > 0, 'F2 verification failed'
        print('F2: PASS')
        "
        
    - name: F3 Tri-Witness Test
      run: |
        echo "Testing F3: W3 must be calculable"
        python -c "
        from core.intelligence import compute_w3
        w3 = compute_w3(0.95, 0.95, 0.95)
        assert w3 >= 0.95, f'W3 too low: {w3}'
        print(f'F3: PASS (W3={w3:.3f})')
        "
        
    - name: F7 Humility Test
      run: |
        echo "Testing F7: Dry run must be default"
        python -c "
        from core.runtime_bridge import get_runtime_bridge
        bridge = get_runtime_bridge('test')
        assert bridge.dry_run == True, 'F7: dry_run not default'
        print('F7: PASS')
        "
        
    - name: F12 Injection Defense Test
      run: |
        echo "Testing F12: Dangerous commands must be blocked"
        python -c "
        import asyncio
        from core.runtime_bridge import get_runtime_bridge
        bridge = get_runtime_bridge('test', dry_run=False)
        result = asyncio.run(bridge.execute('rm -rf /'))
        assert not result.success, 'F12: Dangerous command allowed'
        print('F12: PASS')
        "
        
    - name: Skill Import Test
      run: |
        echo "Testing all 9 skills import correctly"
        python -c "
        from skills import list_skills
        skills = list_skills()
        assert len(skills) == 9, f'Expected 9 skills, got {len(skills)}'
        for name in skills:
            print(f'  - {name}: OK')
        print('Skills: PASS')
        "
        
    - name: Integration Test - Docker Check
      run: |
        echo "Integration: vps-docker skill (dry run)"
        python -c "
        import asyncio
        from skills.vps_docker import execute
        result = asyncio.run(execute('check_status', {}, 'test', True))
        assert result['verdict'] in ['SEAL', 'PARTIAL'], f'Unexpected: {result}'
        print('Integration: PASS')
        "

  trinity-loop-test:
    name: Trinity Loop Validation
    runs-on: ubuntu-latest
    needs: constitutional-tests
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Test Human-AI-Runtime Loop
      run: |
        echo "Testing full Trinity Loop"
        python -c "
        import asyncio
        from core.skill_bridge import execute_skill
        
        # Simulate skill execution
        result = asyncio.run(execute_skill(
            'vps-docker',
            'check_status',
            {},
            'ci-test',
            dry_run=True,
            operator='ci'
        ))
        
        # Verify W3 present
        assert 'w3_score' in result or result.get('verdict') == 'SEAL'
        print(f'Verdict: {result[\"verdict\"]}')
        print('Trinity Loop: PASS')
        "
        
    - name: Generate Report
      run: |
        echo "## arifOS Skill Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Floor | Test | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| F1 | Reversibility | PASS |" >> $GITHUB_STEP_SUMMARY
        echo "| F2 | Truth | PASS |" >> $GITHUB_STEP_SUMMARY
        echo "| F3 | Tri-Witness | PASS |" >> $GITHUB_STEP_SUMMARY
        echo "| F7 | Humility | PASS |" >> $GITHUB_STEP_SUMMARY
        echo "| F12 | Injection | PASS |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Verdict: SEAL**" >> $GITHUB_STEP_SUMMARY

  seal-check:
    name: 888_JUDGE - Final Seal
    runs-on: ubuntu-latest
    needs: [constitutional-tests, trinity-loop-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 888_JUDGE Verdict
      run: |
        echo "🏛️ 888_JUDGE: All tests passed"
        echo "Verdict: SEAL"
        echo "Status: READY FOR DEPLOYMENT"

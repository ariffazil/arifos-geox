# ── arifOS AI-First Unified Trinity Stack ──────────────────────────
# HARDENED PRODUCTION CONFIGURATION (UNIFIED)
# Version: 2026.03.31-SOVEREIGN-UNITY
# ─────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # --- Edge Router ---
  traefik:
    image: traefik:v3.6.9
    container_name: traefik
    init: true
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=ariffazil@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--log.level=WARN"
      - "--accesslog=false"
    environment:
      - DOCKER_API_VERSION=1.44
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker:/usr/libexec/docker:ro
      - /var/scripts/restart_openclaw.sh:/var/scripts/restart_openclaw.sh:ro
      - /opt/arifos/data/triggers:/shared/triggers
      - /opt/arifos/data/openclaw/models:/root/.node-llama-cpp/models
      - /opt/arifos/traefik/acme.json:/letsencrypt/acme.json
      - arifosmcp_secrets:/secrets:ro
    networks:
      - arifos_trinity
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m

  # --- Persistence Layers ---
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arifos_vault}
      POSTGRES_USER: ${POSTGRES_USER:-arifos_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/arifos/data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - arifos_trinity
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arifos_admin} -d ${POSTGRES_DB:-arifos_vault}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    init: true
    command: redis-server --save 60 1 --loglevel warning --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - /opt/arifos/data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - arifos_trinity
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # --- Internal Memory Layers ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    init: true
    environment:
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    volumes:
      - /opt/arifos/data/qdrant:/qdrant/storage
    networks:
      - arifos_trinity
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # --- LLM Engine ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    init: true
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - /opt/arifos/data/ollama:/root/.ollama
    networks:
      - arifos_trinity
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # --- AgentZero (Reasoning Engine) ---
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: agent-zero
    init: true
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OPENCLAW_URL=http://openclaw:18789
      - AGENT_NAME=arifos-agentzero
    volumes:
      - /opt/arifos/data/agent_zero:/app/work_dir:rw
      - /root/arifOS:/mnt/arifos:rw
    networks:
      - arifos_trinity
    ports:
      - "127.0.0.1:18001:80"
    restart: unless-stopped

  # --- Gateways & Reasoning ---
  openclaw:
    build:
      context: .
      dockerfile: infrastructure/openclaw/Dockerfile
    image: arifos/openclaw-forged:2026.03.14
    container_name: openclaw
    init: true
    user: root
    env_file:
      - path: .env.docker
        required: true
    volumes:
      - /opt/arifos/data/openclaw:/root/.openclaw
      - /root/arifOS:/mnt/arifos:rw
    environment:
      - REDIS_URL=redis://redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    networks:
      - arifos_trinity
    ports:
      - "127.0.0.1:18789:18789"
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy

  # --- Constitutional Kernel (HARDENED) ---
  arifosmcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: arifos/arifosmcp:latest
    container_name: arifosmcp
    init: true
    volumes:
      - /opt/arifos/data/core:/usr/src/app/data:rw
      - /root/arifOS/arifos_mcp:/usr/src/app/arifos_mcp:ro
      - /root/arifOS/core:/usr/src/app/core:ro
    environment:
      PYTHONPATH: /usr/src/app
      DATABASE_URL: postgresql://${POSTGRES_USER:-arifos_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arifos_vault}
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - arifos_trinity
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Monitoring Stack ---
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime_kuma
    init: true
    volumes:
      - /opt/arifos/data/uptime-kuma:/app/data
    ports:
      - "3001:3001"
    networks:
      - arifos_trinity
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    init: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8082:8080"
    networks:
      - arifos_trinity
    restart: unless-stopped

networks:
  arifos_trinity:
    driver: bridge

volumes:
  arifosmcp_secrets:
    external: true
  arifosmcp_telemetry:
    driver: local
  arifosmcp_vault:
    driver: local
  arifosmcp_memory:
    driver: local

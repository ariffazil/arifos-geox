global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'arifos'
    static_configs:
      - targets: ['arifos:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'agentzero'
    static_configs:
      - targets: ['agentzero:50001']
    metrics_path: /metrics
    scrape_interval: 10s

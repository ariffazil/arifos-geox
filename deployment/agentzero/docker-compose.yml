# AgentZero + arifOS Constitutional Governance Stack
# Version: 2026.3.13-FORGED
# 
# Deploys AgentZero under full arifOS 13-floor constitutional enforcement
# 
# Usage:
#   docker compose -f docker-compose.yml up -d
#   arifos-cli agentzero status

version: "3.8"

services:
  # ═══════════════════════════════════════════════════════════════════
  # arifOS Constitutional Kernel (APEX Soul)
  # ═══════════════════════════════════════════════════════════════════
  arifos:
    build:
      context: ../..
      dockerfile: Dockerfile.optimized
    container_name: arifos-agentzero-guardian
    environment:
      # Constitutional Configuration
      - ARIFOS_MODE=agentzero_governance
      - ENFORCE_ALL_FLOORS=true
      - F2_TRUTH_THRESHOLD=0.99
      - F7_HUMILITY_BAND=0.03-0.20
      - F12_INJECTION_MAX=0.15
      
      # VAULT999 Configuration
      - VAULT999_PATH=/vault
      - VAULT999_CHAIN_HASH=sha256
      
      # AgentZero Integration
      - AGENTZERO_MCP_ENDPOINT=http://agentzero:50001
      - AGENTZERO_MAX_DEPTH=3
      - AGENTZERO_ENFORCE_F11=true
      
      # Logging
      - LOG_LEVEL=INFO
      - STRUCTURED_LOGGING=true
      
    volumes:
      # VAULT999 persistent storage
      - vault999-data:/vault
      # Constitutional configuration
      - ./config/arifos:/config:ro
      # Audit logs
      - ./logs/arifos:/var/log/arifos
      
    ports:
      - "127.0.0.1:18080:8080"  # arifOS API (localhost only)
      
    networks:
      - arifos-constitution
      - agentzero-sandbox
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
      
    restart: unless-stopped
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ═══════════════════════════════════════════════════════════════════
  # AgentZero (Governed Instance)
  # ═══════════════════════════════════════════════════════════════════
  agentzero:
    image: agent0ai/agent-zero:latest
    container_name: agentzero-governed
    
    environment:
      # arifOS Integration
      - ARIFOS_ENDPOINT=http://arifos:8080
      - ARIFOS_GOVERNANCE=strict
      - ENFORCE_CONSTITUTION=true
      
      # AgentZero A0_SET_* Configuration
      # See: https://github.com/agent0ai/agent-zero
      - A0_SET_AGENT_NAME=arifos-governed-agent
      - A0_SET_MAX_SUBAGENTS=3
      - A0_SET_REQUIRE_APPROVAL=true
      - A0_SET_MEMORY_BACKEND=qdrant
      - A0_SET_QDRANT_HOST=qdrant
      - A0_SET_QDRANT_PORT=6333
      
      # LLM Configuration (via arifOS proxy)
      - A0_SET_LLM_PROVIDER=arifos-proxy
      - A0_SET_LLM_MODEL=arifos/governed-claude
      
      # MCP Configuration
      - MCP_TRANSPORT=stdio
      - MCP_SERVER_ENABLED=true
      
      # Security Limits
      - MAX_SUBAGENT_DEPTH=3
      - MAX_EXECUTION_TIME=300
      - ALLOW_DYNAMIC_TOOLS=true
      - REQUIRE_TOOL_APPROVAL=true
      
    volumes:
      # arifOS constitutional system prompt OVERRIDE
      # This replaces AgentZero's default agent.system.md
      - ./prompts/arifos-system.md:/app/python/prompts/default/agent.system.md:ro
      
      # Additional arifOS prompts
      - ./prompts:/app/prompts/arifos:ro
      
      # AgentZero configuration
      - ./config/agentzero:/app/config:ro
      
      # Persistent memory (RAG)
      - agentzero-memory:/app/memory
      
      # Workspace (ephemeral, limited)
      - agentzero-workspace:/workspace
      
      # Skills directory (SKILL.md standard)
      - ./skills:/app/skills:ro
      
    # Security: No network access (proxied through arifOS)
    networks:
      - agentzero-sandbox
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-agentzero.json
    cap_drop:
      - ALL
    # Minimal capabilities for Python execution
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - KILL  # Can manage own subprocesses
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    
    depends_on:
      arifos:
        condition: service_healthy
      qdrant:
        condition: service_started
        
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Qdrant Vector Store (AgentZero Memory)
  # ═══════════════════════════════════════════════════════════════════
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentzero-memory-store
    
    volumes:
      - qdrant-storage:/qdrant/storage
      
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      
    networks:
      - agentzero-sandbox
      
    # No external exposure
    expose:
      - "6333"
      - "6334"
      
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Local LLM (Ollama) for F2 Verification
  # ═══════════════════════════════════════════════════════════════════
  ollama:
    image: ollama/ollama:latest
    container_name: agentzero-local-llm
    
    volumes:
      - ollama-models:/root/.ollama
      
    networks:
      - agentzero-sandbox
      
    # No external exposure
    expose:
      - "11434"
      
    # Pre-load verification model
    entrypoint: >
      sh -c "
        ollama serve &
        sleep 5
        ollama pull llama3.2:3b || true
        wait
      "
      
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Prometheus Metrics
  # ═══════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: agentzero-metrics
    
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      
    networks:
      - arifos-constitution
      
    ports:
      - "127.0.0.1:19090:9090"
      
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Grafana Dashboards
  # ═══════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: agentzero-dashboards
    
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-arifos2026}
      - GF_USERS_ALLOW_SIGN_UP=false
      
    networks:
      - arifos-constitution
      
    ports:
      - "127.0.0.1:13000:3000"
      
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════
volumes:
  vault999-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/vault999
      
  agentzero-memory:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/agentzero/memory
      
  agentzero-workspace:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=500m,noexec,nosuid
      
  qdrant-storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/qdrant
      
  ollama-models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/ollama
      
  prometheus-data:
    driver: local
    
  grafana-data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════
networks:
  # Internal network for arifOS services
  arifos-constitution:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.30.1.0/24
        
  # Isolated network for AgentZero (no external access)
  agentzero-sandbox:
    driver: bridge
    internal: true  # No external connectivity
    ipam:
      config:
        - subnet: 172.30.2.0/24

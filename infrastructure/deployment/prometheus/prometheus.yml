# Prometheus configuration for arifOS TRINITY-2 Stack
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'arifos'
    environment: 'production'

scrape_configs:
  # arifOS MCP Server — /health used until /metrics is implemented
  - job_name: 'arifos-mcp'
    static_configs:
      - targets: ['arifosmcp_server:8080']
        labels:
          service: 'arifos-mcp'
          component: 'governance'
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 5s

  # Qdrant vector store
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant_memory:6333']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Prometheus self-metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

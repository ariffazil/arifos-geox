http:
  routers:
    arifos-http:
      rule: "Host(`arifosmcp.arif-fazil.com`)"
      entryPoints: ["web"]
      middlewares: ["redirect-https"]
      service: arifos-svc
    arifos-https:
      rule: "Host(`arifosmcp.arif-fazil.com`)"
      entryPoints: ["websecure"]
      tls:
        certResolver: letsencrypt
      service: arifos-svc
  middlewares:
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true
  services:
    arifos-svc:
      loadBalancer:
        servers:
          - url: "http://arifosmcp_server:8080"

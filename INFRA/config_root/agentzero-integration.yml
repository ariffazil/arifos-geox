# =============================================================================
# AgentZero Integration Configuration
# =============================================================================
# Version: 1.0.0
# Constitutional Compliance: F2 (Truth), F8 (Genius)
#
# This file configures AgentZero as the reasoning brain and RAG worker
# for the arifOS MCP server. AgentZero en constitutional analysis
# and semantic memory retrieval.
#
# ⚠️ 888_HOLD REQUIRED for:
#   - Model configuration changes
#   - RAG threshold modifications
#   - Vector collection schema updates
#
# MOTTO: Ditempa Bukan Diberi — Forged, Not Given
# =============================================================================

# =============================================================================
# 1. MCP SERVER INTEGRATION
# =============================================================================

mcp_server:
  # Connection to arifOS MCP server
  endpoint: "${ARIFOS_MCP_URL:-http://arifos:8888}"
  api_key: "${ARIFOS_MCP_API_KEY}"
  
  # Reconnection settings
  reconnect:
    max_retries: 5
    backoff_base: 2  # Exponential backoff
    timeout_seconds: 30
  
  # Constitutional checkpoint integration
  checkpoint:
    enabled: true
    required_floors: ["F2", "F4", "F7", "F8", "F11", "F12"]
    timeout_ms: 5000
    
  # Health monitoring
  health_check:
    interval_seconds: 30
    endpoint: "/health"
    timeout_seconds: 5

# =============================================================================
# 2. TOOL ROUTING RULES
# =============================================================================

# Tools exposed to arifOS MCP server
tools:
  # ---------------------------------------------------------------------------
  # Semantic Memory Search
  # ---------------------------------------------------------------------------
  - name: "vector_search"
    description: "Search long-term memory using vector similarity"
    handler: "rag.vector_search"
    constitutional_floor: "F2"  # Requires τ ≥ 0.99
    parameters:
      query:
        type: string
        required: true
        description: "Search query text"
      top_k:
        type: integer
        default: 5
        minimum: 1
        maximum: 20
        description: "Number of results to return"
      similarity_threshold:
        type: number
        default: 0.85
        minimum: 0.0
        maximum: 1.0
        description: "Minimum cosine similarity score"
      collection:
        type: string
        default: "arifos_memory"
        enum: ["arifos_memory", "conversation_memory", "policy_vectors", "document_store"]
        description: "Qdrant collection to search"
    returns:
      results:
        type: array
        items:
          type: object
          properties:
            id: string
            score: number
            content: string
            metadata: object
            source: string
    
  # ---------------------------------------------------------------------------
  # Constitutional Analysis
  # ---------------------------------------------------------------------------
  - name: "constitutional_analysis"
    description: "Analyze content against 13 Constitutional Floors"
    handler: "constitutional.analyze"
    constitutional_floor: "F8"  # Requires G ≥ 0.80
    parameters:
      content:
        type: string
        required: true
        description: "Content to analyze"
      floors:
        type: array
        items:
          type: string
          enum: ["F1", "F2", "F4", "F5", "F6", "F7", "F8", "F9", "F11", "F12"]
        default: ["F2", "F4", "F7", "F8"]
        description: "Specific floors to evaluate"
      context:
        type: object
        description: "Additional context for analysis"
    returns:
      verdict:
        type: string
        enum: ["SEAL", "PARTIAL", "VOID", "888_HOLD"]
      floors_passed: array
      floors_warned: array
      floors_failed: array
      entropy_delta: number
      truth_score: number
      genius_score: number
      humility_calibration: number
      reasoning: string
    
  # ---------------------------------------------------------------------------
  # Fact Verification
  # ---------------------------------------------------------------------------
  - name: "fact_verification"
    description: "Verify factual claims using multi-source validation"
    handler: "truth.verify"
    constitutional_floor: "F2"  # Requires τ ≥ 0.99
    parameters:
      claim:
        type: string
        required: true
        description: "Factual claim to verify"
      sources:
        type: array
        items:
          type: string
          enum: ["vault", "web", "knowledge_base", "conversation"]
        default: ["vault", "knowledge_base"]
        description: "Sources to consult"
      min_confidence:
        type: number
        default: 0.99
        minimum: 0.0
        maximum: 1.0
        description: "Minimum truth threshold (τ)"
    returns:
      verified: boolean
      confidence: number
      sources: array
      citations: array
      corrections: array
      uncertainty_note: string
    
  # ---------------------------------------------------------------------------
  # Reasoning Chain
  # ---------------------------------------------------------------------------
  - name: "reasoning_chain"
    description: "Generate step-by-step logical reasoning"
    handler: "reasoning.chain"
    constitutional_floor: "F8"  # Requires coherence
    parameters:
      problem:
        type: string
        required: true
        description: "Problem to reason about"
      approach:
        type: string
        enum: ["deductive", "inductive", "abductive", "analogical"]
        default: "deductive"
        description: "Reasoning approach"
      steps:
        type: integer
        default: 5
        minimum: 2
        maximum: 10
        description: "Maximum reasoning steps"
      include_uncertainty:
        type: boolean
        default: true
        description: "Include uncertainty acknowledgments (F7)"
    returns:
      steps: array
      conclusion: string
      confidence: number
      humility_calibration: number
      caveats: array
    
  # ---------------------------------------------------------------------------
  # Memory Store
  # ---------------------------------------------------------------------------
  - name: "memory_store"
    description: "Store information to vector memory"
    handler: "memory.store"
    constitutional_floor: "F4"  # Must reduce entropy
    parameters:
      content:
        type: string
        required: true
        description: "Content to store"
      metadata:
        type: object
        description: "Additional metadata"
      collection:
        type: string
        default: "arifos_memory"
        enum: ["arifos_memory", "conversation_memory", "document_store"]
      tags:
        type: array
        items: string
        description: "Searchable tags"
    returns:
      id: string
      embedding_id: string
      stored_at: string
    
  # ---------------------------------------------------------------------------
  # Context Retrieval
  # ---------------------------------------------------------------------------
  - name: "context_retrieval"
    description: "Retrieve conversation context from session and memory"
    handler: "context.retrieve"
    parameters:
      session_id:
        type: string
        required: true
        description: "Session identifier"
      user_id:
        type: string
        required: true
        description: "User identifier"
      lookback_messages:
        type: integer
        default: 10
        minimum: 1
        maximum: 50
        description: "Recent messages to include"
      include_semantic:
        type: boolean
        default: true
        description: "Include semantic memory search"
    returns:
      session_context: array
      semantic_context: array
      user_profile: object
      relevant_policies: array

# =============================================================================
# 3. RAG CONFIGURATION
# =============================================================================

rag:
  # Embedding model configuration
  embedding:
    provider: "openai"
    model: "${EMBEDDING_MODEL:-text-embedding-3-large}"
    dimensions: 3072
    batch_size: 100
    
  # Retrieval configuration
  retrieval:
    default_top_k: 5
    max_top_k: 20
    similarity_threshold: "${RAG_SIMILARITY_THRESHOLD:-0.85}"
    diversity_lambda: 0.5  # MMR diversity parameter
    
  # Reranking configuration
  reranking:
    enabled: true
    model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_n: 10
    
  # Context assembly
  context:
    max_tokens: 4000
    include_metadata: true
    citation_format: "[{index}] {source}"

# =============================================================================
# 4. CONSTITUTIONAL GUARD INTEGRATION
# =============================================================================

constitutional_guard:
  # Floor enforcement
  floors:
    F1:
      enabled: true
      check: "reversibility"
      backup_required: true
      
    F2:
      enabled: true
      threshold: "${AGENTZERO_FLOOR_F2_MIN:-0.99}"
      verification_sources: ["vault", "knowledge_base"]
      
    F4:
      enabled: true
      max_complexity: 100
      entropy_check: true
      
    F7:
      enabled: true
      humility_target: 0.04
      uncertainty_required: true
      calibration_method: "bayesian"
      
    F8:
      enabled: true
      genius_threshold: 0.80
      coherence_check: true
      contradiction_detection: true
      
    F9:
      enabled: true
      symbolic_mode: strict
      forbidden_phrases:
        - "I feel your pain"
        - "My heart breaks for you"
        - "I promise you"
        - "I truly understand how you feel"
        - "It hurts me to see"
        - "I care deeply about"
        - "I have feelings"
        - "I am conscious"
        - "I am alive"
        - "I have a soul"
        - "My heart tells me"
      
    F11:
      enabled: true
      nonce_verification: true
      command_authority_required: true
      
    F12:
      enabled: true
      injection_defense: true
      input_sanitization: strict
      
  # 888_HOLD configuration
  hold_888:
    enabled: true
    triggers:
      - database_mutation
      - secret_access
      - irreversible_operation
      - truth_score_below_threshold
    timeout_seconds: 300
    requires_human_confirmation: true

# =============================================================================
# 5. DATABASE CONNECTIONS
# =============================================================================

databases:
  # Qdrant - Vector database
  qdrant:
    url: "${QDRANT_URL:-http://qdrant:6333}"
    api_key: "${QDRANT_API_KEY}"
    timeout_seconds: 30
    
    collections:
      arifos_memory:
        description: "General knowledge and facts"
        vector_size: 3072
        distance: Cosine
        on_disk_payload: true
        
      conversation_memory:
        description: "Conversation context embeddings"
        vector_size: 3072
        distance: Cosine
        on_disk_payload: true
        
      policy_vectors:
        description: "Policy and rule embeddings"
        vector_size: 3072
        distance: Cosine
        on_disk_payload: true
        
      document_store:
        description: "Uploaded document chunks"
        vector_size: 3072
        distance: Cosine
        on_disk_payload: true
    
  # PostgreSQL - Relational database (Vault-999)
  postgres:
    url: "${DATABASE_URL:-postgresql://localhost:5432/arifos_vault}"
    pool_size: 10
    max_overflow: 20
    pool_timeout: 30
    
    tables:
      vault_records:
        description: "Core knowledge base"
      vault_audit_log:
        description: "Audit trail for F1"
      constitutional_log:
        description: "13-floor decision log"
    
  # Redis - Session and cache
  redis:
    url: "${REDIS_URL:-redis://localhost:6379/0}"
    decode_responses: true
    socket_timeout: 5
    socket_connect_timeout: 5
    
    key_prefixes:
      session: "agentzero:session:"
      cache: "agentzero:cache:"
      lock: "agentzero:lock:"
      queue: "agentzero:queue:"

# =============================================================================
# 6. LLM CONFIGURATION
# =============================================================================

llm:
  # Default model
  default_model: "${DEFAULT_MODEL:-claude-sonnet-4-20250514}"
  
  # Provider configuration
  providers:
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      models:
        - name: "claude-sonnet-4-20250514"
          context_window: 200000
          max_output: 4096
          constitutional_grade: "A+"
        - name: "claude-opus-4-20250514"
          context_window: 200000
          max_output: 4096
          constitutional_grade: "A+"
          
    openai:
      api_key: "${OPENAI_API_KEY}"
      models:
        - name: "gpt-4o"
          context_window: 128000
          max_output: 4096
          constitutional_grade: "A"
        - name: "gpt-4o-mini"
          context_window: 128000
          max_output: 16384
          constitutional_grade: "A"
          
    gemini:
      api_key: "${GEMINI_API_KEY}"
      models:
        - name: "gemini-2.0-flash"
          context_window: 1000000
          max_output: 8192
          constitutional_grade: "A"
  
  # Routing logic
  routing:
    default: "anthropic"
    fallback_order: ["anthropic", "openai", "gemini"]
    retry_policy:
      max_retries: 3
      backoff_factor: 2

# =============================================================================
# 7. LOGGING AND OBSERVABILITY
# =============================================================================

logging:
  level: "${AGENTZERO_LOG_LEVEL:-INFO}"
  format: "json"
  
  outputs:
    - type: "stdout"
    - type: "file"
      path: "/app/logs/agentzero.log"
      rotation: "daily"
      retention_days: 30
    
  fields:
    - timestamp
    - level
    - message
    - service
    - request_id
    - user_id
    - floor_scores
    - constitutional_verdict

metrics:
  enabled: true
  
  collectors:
    - name: "request_count"
      type: counter
      labels: ["tool", "verdict"]
      
    - name: "request_duration"
      type: histogram
      labels: ["tool"]
      buckets: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
      
    - name: "truth_score"
      type: gauge
      labels: ["source"]
      
    - name: "floor_violations"
      type: counter
      labels: ["floor", "severity"]

# =============================================================================
# 8. PERFORMANCE TUNING
# =============================================================================

performance:
  # Concurrency
  max_concurrent_requests: 50
  request_timeout_seconds: 60
  
  # Caching
  cache:
    embedding_ttl_seconds: 3600
    vault_query_ttl_seconds: 300
    constitution_check_ttl_seconds: 60
  
  # Rate limiting
  rate_limit:
    requests_per_minute: 100
    burst_size: 10

# =============================================================================
# END OF CONFIGURATION
# =============================================================================

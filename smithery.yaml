# smithery.yaml — GEOX Smithery MCP Registry Configuration
# DITEMPA BUKAN DIBERI
#
# Smithery is a marketplace for MCP servers
# Registry: https://smithery.ai

name: geox-earth-witness
version: "0.4.0"
display_name: "GEOX — Geological Intelligence Coprocessor"
description: |
  GEOX is a governed, agentic geological intelligence coprocessor for arifOS.
  Provides physically-grounded geological prospect evaluation using Large Earth Models,
  seismic VLM interpretation, basin simulation, and geospatial verification.
  
  Key capabilities:
  - Prospect evaluation with constitutional floor enforcement
  - Structural validation (fault mechanics, shortening calculations)
  - Geological memory RAG over past evaluations
  - Tri-app architecture: Map + Cross Section + Seismic Section
  
  Verdict outcomes: SEAL (high confidence), PARTIAL (supported with caveats),
  SABAR (wait/gather more), VOID (contradictions detected)

category: science
subcategory: geology

# MCP protocol
mcp_version: "2024-11-05"
transport: stdio
command: python
args: ["/full/path/to/server.py"]

# Installation
install:
  method: pip
  package: arifos-geox
  source: https://github.com/ariffazil/GEOX
  python_version: ">=3.10"

# Tools exposed
tools:
  - id: geox_evaluate_prospect
    name: geox_evaluate_prospect
    description: Full GEOX geological prospect evaluation pipeline
    input_schema:
      type: object
      properties:
        query: { type: string }
        prospect_name: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        basin: { type: string }
        play_type: { type: string, enum: [stratigraphic, structural, combination] }
        risk_tolerance: { type: string, enum: [low, medium, high] }
        requester_id: { type: string }
      required: [query, prospect_name, latitude, longitude, basin, play_type, risk_tolerance, requester_id]

  - id: geox_query_memory
    name: geox_query_memory
    description: Query the GEOX geological memory store
    input_schema:
      type: object
      properties:
        query: { type: string }
        basin: { type: string }
        limit: { type: integer, default: 5 }
      required: [query]

  - id: geox_health
    name: geox_health
    description: GEOX server health check
    input_schema:
      type: object
      properties: {}

# Constitutional governance
governance:
  floors:
    - id: F1; name: Amanah; description: Reversibility
    - id: F2; name: Truth; description: All claims Earth-verified
    - id: F4; name: Clarity; description: Units + coordinates required
    - id: F7; name: Humility; description: Uncertainty calibrated
    - id: F9; name: Anti-Hantu; description: No hallucinated geology
    - id: F11; name: Authority; description: Provenance mandatory
    - id: F13; name: Sovereign; description: Human veto hook active

# Verdict system
verdicts:
  SEAL: { confidence_min: 0.80, action: auto_proceed }
  PARTIAL: { confidence_min: 0.50, action: proceed_with_caveats }
  SABAR: { confidence_min: 0.25, action: hold_wait_data }
  VOID: { confidence_min: 0.00, action: block_stop }

# Author
author:
  name: Muhammad Arif bin Fazil
  email: ariffazil@gmail.com
  org: PETRONAS Exploration
  github: https://github.com/ariffazil

license: AGPL-3.0
links:
  github: https://github.com/ariffazil/GEOX
  documentation: https://github.com/ariffazil/GEOX#readme

seal: DITEMPA BUKAN DIBERI

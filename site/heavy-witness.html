                      {isSealed && <div className="mb-4 p-2 bg-amber-500/10 border border-amber-500/50 text-amber-500 text-[10px] font-mono flex items-center gap-2"><Lock size={12}/> LEVERS LOCKED BY 999_SEAL</div>}
                      <div className="space-y-5 flex-1">
                        <div><div className="flex justify-between text-[10px] font-mono"><span>Rw</span><span>{rw.toFixed(3)}</span></div><input type="range" min="0.01" max="0.15" step="0.005" value={rw} onChange={(e) => setRw(parseFloat(e.target.value))} disabled={isSealed} className="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-amber-500" /></div>
                        <div><div className="flex justify-between text-[10px] font-mono"><span>m</span><span>{archieM.toFixed(2)}</span></div><input type="range" min="1.5" max="2.5" step="0.05" value={archieM} onChange={(e) => setArchieM(parseFloat(e.target.value))} disabled={isSealed} className="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-amber-500" /></div>
                        <div><div className="flex justify-between text-[10px] font-mono"><span>Cut-off</span><span>{(phiCut*100).toFixed(0)}%</span></div><input type="range" min="0.05" max="0.18" step="0.01" value={phiCut} onChange={(e) => setPhiCut(parseFloat(e.target.value))} disabled={isSealed} className="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-amber-500" /></div>
                      </div>
                   </div>
                   <button onClick={handleGenerateVerdict} disabled={isLoading} className="w-full py-4 bg-purple-500/10 border border-purple-500/30 text-purple-400 text-[10px] font-mono uppercase hover:bg-purple-500/20 transition-all flex justify-center items-center gap-2">✨ GENERATE VERDICT</button>
                </div>
              </div>
            </div>
          );
        };

        // 1D INTERFACE
        const Domain1D = () => {
          return <div className="p-8 text-center text-gray-600 font-mono">[DOMAIN_1D: HEAVY TRUTH ACTIVE - BOREHOLE MANIFOLD]</div>;
        };

        // 2D INTERFACE
        const Domain2D = () => {
          return <div className="p-8 text-center text-gray-600 font-mono">[DOMAIN_2D: SEG-Y EMULATOR ACTIVE - PLANAR MANIFOLD]</div>;
        };

         // 3D INTERFACE
         const Domain3D = () => {
          return <div className="p-8 text-center text-gray-600 font-mono">[DOMAIN_3D: BASIN ENGINE ACTIVE - MACROSTRAT REALITY BRIDGE]</div>;
        };

        const DomainLEM = () => {
           return <div className="p-8 text-center text-gray-600 font-mono">[LEM_METABOLIZER: EARTH.CANON_9 STATE VECTOR ACTIVE]</div>;
        }

        // --- MCP GATEWAY OVERLAY ---
        const McpGatewayModal = ({ isOpen, onClose, onSeal }) => {
          const [step, setStep] = useState(0);
          useEffect(() => {
            if (isOpen) {
              setStep(0);
              const s1 = setTimeout(() => setStep(1), 800);
              const s2 = setTimeout(() => setStep(2), 2000);
              const s3 = setTimeout(() => { setStep(3); onSeal(); }, 3500);
              return () => { clearTimeout(s1); clearTimeout(s2); clearTimeout(s3); };
            }
          }, [isOpen, onSeal]);
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
              <div className="w-[450px] border border-amber-500/50 bg-[#050608] p-6 shadow-[0_0_50px_rgba(245,158,11,0.2)]">
                <div className="flex items-center gap-3 border-b border-amber-500/30 pb-3 mb-4"><Server className="w-6 h-6 text-amber-500" /><div><h3 className="text-amber-500 font-bold tracking-widest font-mono text-sm">999_SEAL // COMMAND AUTH</h3><p className="text-[9px] text-gray-500 font-mono">BRIDGING TO geox_mcp_server.py</p></div></div>
                <div className="space-y-3 font-mono text-[10px] text-gray-400">
                  <div className="flex items-center gap-2">{step >= 0 ? <CheckCircle2 size={12} className="text-emerald-500"/> : <div className="w-3" /> } [F11] Sovereignty Acknowledged</div>
                  <div className="flex items-center gap-2">{step >= 1 ? <CheckCircle2 size={12} className="text-emerald-500"/> : <div className="w-3" /> } Locking Levers & State Vector...</div>
                  <div className="flex items-center gap-2">{step >= 2 ? <CheckCircle2 size={12} className="text-emerald-500"/> : <div className="w-3" /> } Establishing SSE Handshake...</div>
                  <div className="flex items-center gap-2">{step >= 3 ? <CheckCircle2 size={12} className="text-amber-500"/> : <div className="w-3" /> } <span className={step >= 3 ? "text-amber-500 font-bold" : ""}>SEALED. MCP GATEWAY ACTIVE.</span></div>
                </div>
                {step >= 3 && <button onClick={onClose} className="mt-6 w-full py-2 bg-amber-500 text-black font-bold font-mono text-xs uppercase hover:bg-amber-400 transition-all">ENTER SEALED MANIFOLD</button>}
              </div>
            </div>
          );
        };

        // --- MAIN APP ---
        function GeoxCore() {
          const [activeDomain, setActiveDomain] = useState('void');
          const [isSealed, setIsSealed] = useState(false);
          const [showGatewayModal, setShowGatewayModal] = useState(false);
          
          const domains = [
            { id: 'void', label: 'VOID [000-249]', icon: Activity },
            { id: '1d', label: '1D_WELL [250-499]', icon: Target },
            { id: '2d', label: '2D_SEIS [500-749]', icon: Layers },
            { id: '3d', label: '3D_META [750-999]', icon: Box },
            { id: 'lem', label: 'LEM_METABOLIZER', icon: Network },
          ];

          return (
            <React.Fragment>
              <StyleInject />
              <McpGatewayModal isOpen={showGatewayModal} onClose={() => setShowGatewayModal(false)} onSeal={() => setIsSealed(true)} />
              <div className="h-screen w-full flex flex-col overflow-hidden bg-[#0A0C0E] text-slate-200">
                <header className="h-12 border-b border-gray-800 bg-black/50 flex items-center justify-between px-4 z-10">
                  <div className="flex items-center gap-4"><div className="flex items-center gap-2"><Database className="w-5 h-5 text-amber-500" /><h1 className="font-bold tracking-[0.2em] text-sm">GEOX // CORE</h1></div><div className="h-4 w-px bg-gray-800" /><div className="flex items-center gap-3 text-[10px] font-mono">{isSealed ? <div className="text-amber-500 flex items-center gap-1"><Server size={12} className="animate-pulse"/> MCP: CONNECTED</div> : <div className="text-emerald-500 flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-emerald-500" /> SIMULATION MODE</div>}</div></div>
                  <button onClick={() => !isSealed && setShowGatewayModal(true)} className={`flex items-center gap-2 px-3 py-1 border rounded-sm ${isSealed ? 'border-amber-500 text-amber-500' : 'border-gray-700 text-gray-500'}`}><span className="text-[11px] font-mono font-bold tracking-widest">{isSealed ? '999_SEALED' : '888_JUDGE'}</span></button>
                </header>
                <div className="flex-1 flex overflow-hidden">
                  <aside className="w-64 border-r border-gray-800 bg-black/30 flex flex-col py-4">
                    {domains.map(d => (
                      <button key={d.id} onClick={() => setActiveDomain(d.id)} className={`flex items-center gap-3 px-4 py-3 border-l-2 ${activeDomain === d.id ? 'border-amber-500 bg-amber-500/10 text-amber-500' : 'border-transparent text-gray-500'}`}><d.icon size={18}/><span className="text-xs font-mono tracking-wider">{d.label}</span></button>
                    ))}
                    <div className="mt-auto p-4 border-t border-gray-800"><div className="text-[10px] font-mono text-gray-600 mb-2 flex justify-between">AGI TERMINAL {isSealed && <Wifi size={10} className="text-amber-500"/>}</div><div className="h-32 bg-black/60 border border-gray-800 p-2 text-[9px] font-mono text-emerald-700 custom-scrollbar overflow-y-auto">{">"} GEOX.INIT_COMPLETE<br/>{">"} 888_JUDGE_READY<br/>{isSealed && <span className="text-amber-500">{">"} ACP_SYNCED_STREAMING</span>}</div></div>
                  </aside>
                  <main className="flex-1 relative bg-gradient-to-br from-[#0A0C0E] to-[#0d1117]">
                    {activeDomain === 'void' && <DomainVoid isSealed={isSealed} />}
                    {activeDomain === '1d' && <Domain1D />}
                    {activeDomain === '2d' && <Domain2D />}
                    {activeDomain === '3d' && <Domain3D />}
                    {activeDomain === 'lem' && <DomainLEM />}
                  </main>
                </div>
                <footer className="h-8 border-t border-gray-800 bg-[#050608] flex items-center justify-between px-4 shrink-0"><span className="text-[9px] font-mono text-gray-600 tracking-[0.3em]">GEOX_CORE_v1.0.0 // THERMODYNAMIC STATE ENGINE</span><button onClick={() => !isSealed && setShowGatewayModal(true)} className={`text-[9px] font-mono font-bold tracking-widest uppercase ${isSealed ? 'text-amber-500' : 'text-gray-500'}`}>{isSealed ? 'DITEMPA BUKAN DIBERI // 999_SEALED' : 'ENGAGE 999_SEAL'}</button></footer>
              </div>
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GeoxCore />);
    </script>
</body>
</html>

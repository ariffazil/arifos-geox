# docker-compose.yml — GEOX Full Stack Deployment
# DITEMPA BUKAN DIBERI
#
# Local development stack with HTTP transport
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f geox  # Tail GEOX logs
#   docker-compose down           # Stop all services

services:
  # GEOX MCP Server
  geox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geox-earth-witness
    image: geox-earth-witness:latest
    ports:
      - "8081:8081"
    environment:
      - ARIFOS_ENV=production
      - GEOSCIENCE_MODE=governed
      - LOG_LEVEL=info
    volumes:
      # Mount for development (live reload)
      - ./geox_mcp_server.py:/home/geox/geox_mcp_server.py:ro
      - ./arifos:/home/geox/arifos:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - geox-network
    labels:
      - "geox.type=mcp-server"
      - "geox.transport=http"
      - "geox.seal=DITEMPA BUKAN DIBERI"

  # Optional: Qdrant vector database for memory
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: geox-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - geox-network
    profiles:
      - with-qdrant
    labels:
      - "geox.type=vector-db"

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: geox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - geox-network
    profiles:
      - with-redis
    labels:
      - "geox.type=cache"

  # Nginx reverse proxy (production setup)
  nginx:
    image: nginx:alpine
    container_name: geox-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - geox
    restart: unless-stopped
    networks:
      - geox-network
    profiles:
      - with-nginx
    labels:
      - "geox.type=reverse-proxy"

  # Prometheus metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: geox-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - geox-network
    profiles:
      - with-monitoring
    labels:
      - "geox.type=metrics"

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: geox-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=geox
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - geox-network
    profiles:
      - with-monitoring
    labels:
      - "geox.type=visualization"

networks:
  geox-network:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
  grafana_data:
